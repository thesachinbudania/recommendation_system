version: '3.8'
services:
  minio:
    image: minio/minio
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ACCESS_KEY: minio-admin
      MINIO_SECRET_KEY: minio-admin
  minio-setup:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minio-admin minio-admin;
      /usr/bin/mc rm -r --force myminio/test-bucket;
      /usr/bin/mc mb myminio/test-bucket;
      /usr/bin/mc policy download myminio/test-bucket;
      exit 0;
      "
volumes:
  minio_data: